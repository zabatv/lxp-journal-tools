<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LXP Journal Filler — Вход</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; background: #f7f9fc; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.card { background: #fff; border-radius: 16px; padding: 40px; width: 420px; box-shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.04); }
h1 { color: #ab00ea; font-size: 22px; font-weight: 700; text-align: center; margin-bottom: 24px; }
.tabs { display: flex; gap: 4px; background: #f0f0f0; border-radius: 10px; padding: 3px; margin-bottom: 20px; }
.tab { flex: 1; text-align: center; padding: 8px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; color: #6b7280; transition: .15s; border: none; background: transparent; }
.tab.active { background: #fff; color: #111; box-shadow: 0 1px 2px rgba(0,0,0,.06); }
.tab-content { display: none; }
.tab-content.active { display: block; }
label { display: block; font-size: 13px; font-weight: 600; color: #111; margin-bottom: 4px; }
input[type="email"], input[type="password"], textarea { width: 100%; padding: 10px 12px; border: 1px solid #e2e5ea; border-radius: 10px; font-size: 14px; font-family: inherit; background: #f7f9fc; outline: none; transition: .15s; }
input:focus, textarea:focus { border-color: #ab00ea; box-shadow: 0 0 0 3px rgba(171,0,234,.12); }
textarea { font-family: 'SF Mono', 'Consolas', monospace; font-size: 13px; resize: vertical; }
.form-group { margin-bottom: 14px; }
.btn { width: 100%; padding: 10px; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: .15s; }
.btn-primary { background: #111; color: #fff; }
.btn-primary:hover { background: #333; }
.btn-primary:disabled { background: #999; cursor: not-allowed; }
.status { font-size: 13px; text-align: center; margin-top: 8px; min-height: 20px; }
.status.error { color: #dc2626; }
.status.success { color: #059669; }
.separator { display: flex; align-items: center; gap: 12px; margin: 16px 0; color: #9ca3af; font-size: 12px; }
.separator::before, .separator::after { content: ''; flex: 1; height: 1px; background: #e2e5ea; }
</style>
</head>
<body>
<div class="card">
  <h1>LXP Journal Filler</h1>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">Войти</button>
    <button class="tab" onclick="switchTab('token')">Токен</button>
  </div>

  <div id="tab-login" class="tab-content active">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="example@mail.com">
    </div>
    <div class="form-group">
      <label>Пароль</label>
      <input type="password" id="password" placeholder="••••••••">
    </div>
    <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">Войти</button>
    <div class="status" id="loginStatus"></div>
  </div>

  <div id="tab-token" class="tab-content">
    <div class="form-group">
      <label>Токен</label>
      <textarea id="tokenInput" rows="3" placeholder="Вставьте токен..."></textarea>
    </div>
    <button class="btn btn-primary" id="tokenBtn" onclick="doToken()">Подтвердить</button>
    <div class="status" id="tokenStatus"></div>
  </div>
</div>

<script>
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  if (name === 'login') {
    document.querySelectorAll('.tab')[0].classList.add('active');
    document.getElementById('tab-login').classList.add('active');
  } else {
    document.querySelectorAll('.tab')[1].classList.add('active');
    document.getElementById('tab-token').classList.add('active');
  }
}

function setStatus(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'status' + (type ? ' ' + type : '');
}

async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!email || !password) { setStatus('loginStatus', 'Введите email и пароль', 'error'); return; }
  setStatus('loginStatus', 'Идёт вход...', '');
  document.getElementById('loginBtn').disabled = true;
  try {
    const r = await fetch('/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) });
    if (!r.ok) { const e = await r.json(); throw new Error(e.detail); }
    const data = await r.json();
    localStorage.setItem('lxp_token', data.token);
    window.location.href = '/dashboard';
  } catch (e) {
    setStatus('loginStatus', e.message, 'error');
    document.getElementById('loginBtn').disabled = false;
  }
}

async function doToken() {
  const token = document.getElementById('tokenInput').value.trim();
  if (!token) { setStatus('tokenStatus', 'Введите токен', 'error'); return; }
  setStatus('tokenStatus', 'Проверка...', '');
  document.getElementById('tokenBtn').disabled = true;
  try {
    const r = await fetch('/api/auth/check', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token }) });
    if (!r.ok) { const e = await r.json(); throw new Error(e.detail); }
    localStorage.setItem('lxp_token', token.replace(/^Bearer\s+/i, ''));
    window.location.href = '/dashboard';
  } catch (e) {
    setStatus('tokenStatus', e.message, 'error');
    document.getElementById('tokenBtn').disabled = false;
  }
}

// Enter key support
document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('tokenInput').addEventListener('keydown', e => { if (e.key === 'Enter' && e.ctrlKey) doToken(); });
</script>
</body>
</html>
